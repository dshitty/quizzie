<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamPulse — My Results</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="layoutSidebar"></div>
  <main class="main-content">
    <div class="page-header">
      <div class="page-title">📊 My Results</div>
      <div class="page-subtitle">All your quiz history in one place</div>
    </div>
    <div class="card" id="resultsContainer">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No quizzes taken yet.</div>
      </div>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/ui.js"></script>
<script>
  if (!UI.requireAuth('student')) throw new Error();
  document.getElementById('layoutSidebar').innerHTML = LAYOUT.studentSidebar;
  UI.initSidebar(); UI.initUserInfo(); UI.initLogout();
  UI.setActiveNav('nav-results');

  // Ensure data is loaded from localStorage
  APP.init();

  const results = APP.getUserResults(APP.currentUser.id);
  const container = document.getElementById('resultsContainer');

  if (results.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No quizzes taken yet.</div></div>';
    return;
  }

  const rows = results.map(r => {
    const quiz = APP.quizzes.find(q => q.id === r.quizId);
    return `
      <tr>
        <td class="td-primary">${quiz?.title || 'Unknown'}</td>
        <td>${quiz?.subject || '—'}</td>
        <td>
          <strong style="font-size:1.05rem">${r.score}/${r.total}</strong>
          <div class="score-bar-wrap" style="margin-top:4px;min-width:100px">
            <div class="score-bar-bg">
              <div class="score-bar-fill" data-pct="${r.percent}" style="width:0;background:${r.percent>=80?'var(--success)':r.percent>=50?'var(--warning)':'var(--danger)'}"></div>
            </div>
          </div>
        </td>
        <td><span class="badge ${APP.badgeClass(r.percent)}">${r.percent}%</span></td>
        <td style="font-size:0.78rem;color:var(--text-muted)">${APP.formatDate(r.date)}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="viewResult('${r.id}')">View Details →</button>
        </td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Quiz</th><th>Subject</th><th>Score</th><th>%</th><th>Date</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  UI.animateScoreBars();

  function viewResult(id) {
    sessionStorage.setItem('ep_result', id);
    window.location.href = 'student-result.html';
  }
</script>
</body>
</html>

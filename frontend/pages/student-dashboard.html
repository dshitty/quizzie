<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamPulse — Student Dashboard</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar injected by JS -->
      <div id="layoutSidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div class="page-title" id="welcomeTitle">Welcome back! 👋</div>
          <div class="page-subtitle">Here's what's happening today</div>
        </div>

        <!-- Stats row -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-icon">📝</div>
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Tests Taken</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🏆</div>
            <div class="stat-value" id="statBest">—</div>
            <div class="stat-label">Best Score</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-value" id="statAvg">—</div>
            <div class="stat-label">Average %</div>
          </div>
        </div>

        <!-- Active Test Banner -->
        <div id="activeTestBanner"></div>

        <!-- Past Results -->
        <div class="section-title">📋 My Past Results</div>
        <div class="card" id="resultsContainer">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">
              No quizzes taken yet. Start your first test!
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      if (!UI.requireAuth("student")) throw new Error("not auth");

      // Inject sidebar
      document.getElementById("layoutSidebar").innerHTML =
        LAYOUT.studentSidebar;
      UI.initSidebar();
      UI.initUserInfo();
      UI.initLogout();
      UI.setActiveNav("nav-dashboard");

      // Welcome
      document.getElementById("welcomeTitle").textContent =
        `Welcome back, ${APP.currentUser.name.split(" ")[0]}! 👋`;

      // Stats
      const results = APP.getUserResults(APP.currentUser.id);
      document.getElementById("statTotal").textContent = results.length;
      if (results.length) {
        const best = Math.max(...results.map((r) => r.percent));
        const avg = Math.round(
          results.reduce((a, r) => a + r.percent, 0) / results.length,
        );
        document.getElementById("statBest").textContent = best + "%";
        document.getElementById("statAvg").textContent = avg + "%";
      }

      // Active test banner
      const activeQuiz = APP.getActiveQuiz();
      const alreadyDone = results.find((r) => r.quizId === activeQuiz?.id);
      const bannerEl = document.getElementById("activeTestBanner");

      if (activeQuiz && !alreadyDone) {
        bannerEl.innerHTML = `
      <div class="available-test-card" style="margin-bottom:28px;">
        <div class="available-tag">🟢 Test Available Now</div>
        <div class="available-title">${activeQuiz.title}</div>
        <div class="available-meta">
          <div class="meta-item">📚 ${activeQuiz.subject}</div>
          <div class="meta-item">⏱️ ${activeQuiz.duration} minutes</div>
          <div class="meta-item">📝 ${activeQuiz.questions.length} questions</div>
          <div class="meta-item">🏆 ${activeQuiz.totalMarks} marks</div>
        </div>
        <button class="btn btn-accent btn-lg" onclick="startQuiz('${activeQuiz.id}')">
          Start Test →
        </button>
      </div>
    `;
      } else if (activeQuiz && alreadyDone) {
        bannerEl.innerHTML = `
      <div class="alert alert-success" style="margin-bottom:20px;">
        ✅ You have already completed "${activeQuiz.title}". Great job!
      </div>
    `;
      } else {
        bannerEl.innerHTML = `
      <div class="card-sm" style="margin-bottom:24px;color:var(--text-muted);font-size:0.88rem;">
        📭 No active test right now. Check back later!
      </div>
    `;
      }

      // Results table
      const container = document.getElementById("resultsContainer");
      if (results.length === 0) {
        // keep empty state
      } else {
        const rows = results
          .map((r) => {
            const quiz = APP.quizzes.find((q) => q.id === r.quizId);
            const pct = r.percent;
            return `
        <tr>
          <td class="td-primary">${quiz?.title || "Unknown Quiz"}</td>
          <td>${quiz?.subject || "—"}</td>
          <td>
            <span style="font-size:1.1rem;font-weight:700;color:var(--text-primary)">${r.score}/${r.total}</span>
            <div class="score-bar-wrap">
              <div class="score-bar-bg">
                <div class="score-bar-fill" data-pct="${pct}" style="width:0;background:${pct >= 80 ? "var(--success)" : pct >= 50 ? "var(--warning)" : "var(--danger)"}"></div>
              </div>
            </div>
          </td>
          <td><span class="badge ${APP.badgeClass(pct)}">${pct}%</span></td>
          <td style="font-size:0.78rem;color:var(--text-muted)">${APP.formatDate(r.date)}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="viewResult('${r.id}')">View →</button>
          </td>
        </tr>
      `;
          })
          .join("");

        container.innerHTML = `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Quiz</th><th>Subject</th><th>Score</th><th>%</th><th>Date</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
        UI.animateScoreBars();
      }

      function startQuiz(quizId) {
        APP.currentQuiz = APP.quizzes.find((q) => q.id === quizId);
        APP.quizAnswers = {};
        APP.quizStartTime = Date.now();
        sessionStorage.setItem("ep_quiz", quizId);
        window.location.href = "student-quiz.html";
      }

      function viewResult(resultId) {
        sessionStorage.setItem("ep_result", resultId);
        window.location.href = "student-result.html";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Quizzes — ExamPulse</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="layoutSidebar"></div>

      <main class="main-content">
        <div class="page-header">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              gap: 1rem;
            "
          >
            <div>
              <div class="page-title">All Quizzes</div>
              <div class="page-subtitle">Manage your created quizzes</div>
            </div>
            <button
              class="btn-primary"
              onclick="window.location.href = 'teacher-create-quiz.html'"
            >
              + Create Quiz
            </button>
          </div>
        </div>

        <div
          id="quizzesContainer"
          style="
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
          "
        ></div>
      </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      function toggleActive(quizId) {
        const quiz = APP.quizzes.find((q) => q.id === quizId);
        if (!quiz) return;

        // Deactivate all others
        APP.quizzes.forEach((q) => (q.active = false));
        // Activate this one
        quiz.active = !quiz.active;
        renderQuizzes();
        UI.toast(
          quiz.active ? "Quiz activated!" : "Quiz deactivated!",
          "success",
        );
      }

      function deleteQuiz(quizId) {
        UI.confirm(
          "Delete Quiz?",
          "Are you sure you want to delete this quiz?",
          () => {
            const idx = APP.quizzes.findIndex((q) => q.id === quizId);
            if (idx > -1) {
              APP.quizzes.splice(idx, 1);
              renderQuizzes();
              UI.toast("Quiz deleted!", "success");
            }
          },
        );
      }

      function renderQuizzes() {
        const createdByMe = APP.quizzes.filter(
          (q) => q.createdBy === APP.currentUser.id,
        );
        const container = document.getElementById("quizzesContainer");

        if (createdByMe.length === 0) {
          container.innerHTML =
            '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 2rem;">No quizzes created yet</p>';
          return;
        }

        container.innerHTML = createdByMe
          .map(
            (quiz) => `
        <div class="card" style="display: flex; flex-direction: column;">
          <div style="flex: 1;">
            <h3 style="margin-bottom: 0.5rem;">${quiz.title}</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;">${quiz.subject}</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
              <div>⏱️ ${quiz.duration} min</div>
              <div>⭐ ${quiz.totalMarks} marks</div>
              <div>📝 ${quiz.questions?.length || 0} Q's</div>
              <div>${quiz.active ? "🟢 Active" : "⚪ Inactive"}</div>
            </div>
          </div>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn-secondary" onclick="toggleActive('${quiz.id}')" style="flex: 1; font-size: 0.85rem;">
              ${quiz.active ? "Deactivate" : "Activate"}
            </button>
            <button class="btn-danger" onclick="deleteQuiz('${quiz.id}')" style="flex: 0.3; font-size: 0.85rem;">🗑️</button>
          </div>
        </div>
      `,
          )
          .join("");
      }

      if (!UI.requireAuth("teacher")) throw new Error("not auth");

      // Inject sidebar
      document.getElementById("layoutSidebar").innerHTML =
        LAYOUT.teacherSidebar;
      UI.initSidebar();
      UI.initUserInfo();
      UI.initLogout();
      renderQuizzes();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Results — ExamPulse</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="layoutSidebar"></div>
      <main class="main-content">
        <div class="page-header">
          <div class="page-title">📊 Student Results</div>
          <div class="page-subtitle">All student quiz submissions</div>
        </div>
        <div class="card" id="resultsContainer">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">No results yet</div>
          </div>
        </div>
      </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      if (!UI.requireAuth("teacher")) throw new Error();
      document.getElementById("layoutSidebar").innerHTML =
        LAYOUT.teacherSidebar;
      UI.initSidebar();
      UI.initUserInfo();
      UI.initLogout();
      UI.setActiveNav("nav-results");

      const results = APP.getAllResults();
      const container = document.getElementById("resultsContainer");

      console.log("Results:", results);
      console.log("APP data:", {
        users: APP.users,
        quizzes: APP.quizzes,
        allResults: APP.results,
      });

      const rows =
        results.length > 0
          ? results
              .map((r) => {
                const statusColor =
                  r.percent >= 70
                    ? "var(--success)"
                    : r.percent >= 50
                      ? "var(--warning)"
                      : "var(--danger)";
                return `
      <tr>
        <td class="td-primary">${r.userName}</td>
        <td>${r.quizTitle || "Unknown"}</td>
        <td>${r.subject || "—"}</td>
        <td>
          <strong style="font-size:1.05rem">${r.score}/${r.total}</strong>
          <div class="score-bar-wrap" style="margin-top:4px;min-width:100px">
            <div class="score-bar-bg">
              <div class="score-bar-fill" data-pct="${r.percent}" style="width:0;background:${statusColor}"></div>
            </div>
          </div>
        </td>
        <td><span style="color:${statusColor};font-weight:600">${r.percent}%</span></td>
        <td style="font-size:0.78rem;color:var(--text-muted)">${APP.formatDate(r.date)}</td>
      </tr>
    `;
              })
              .join("")
          : '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">No results yet</td></tr>';

      container.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Student</th><th>Quiz</th><th>Subject</th><th>Score</th><th>%</th><th>Date</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
      UI.animateScoreBars();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamPulse — Quiz</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      body {
        overflow: hidden;
      }
      @media (max-width: 640px) {
        body {
          overflow: auto;
        }
      }
    </style>
  </head>
  <body style="background: var(--bg-base)">
    <!-- Quiz Header -->
    <div class="quiz-header">
      <div class="quiz-title-wrap">
        <div class="quiz-name" id="quizName">Loading quiz…</div>
        <div class="quiz-meta-sm" id="quizMeta"></div>
      </div>
      <div class="timer-box">
        <div>
          <div class="timer-label">Time Remaining</div>
          <div class="timer-value" id="timerDisplay">15:00</div>
        </div>
      </div>
      <button class="btn btn-accent" id="btnSubmit" onclick="confirmSubmit()">
        Submit Test
      </button>
    </div>

    <!-- Quiz Body -->
    <div class="quiz-body">
      <!-- Q Navigation Panel -->
      <div class="q-nav-panel">
        <div class="q-nav-title">Questions</div>
        <div class="q-grid" id="qGrid"></div>
        <div class="q-legend">
          <div class="q-legend-item">
            <div class="q-dot answered"></div>
            Answered
          </div>
          <div class="q-legend-item">
            <div class="q-dot not-answered"></div>
            Not answered
          </div>
        </div>
      </div>

      <!-- Q Content -->
      <div class="q-content" id="qContent">
        <div class="q-number" id="qNumber"></div>
        <div class="q-text" id="qText"></div>
        <div class="options-list" id="optionsList"></div>
        <div class="q-footer">
          <button class="btn btn-outline" id="btnPrev" onclick="navigate(-1)">
            ← Previous
          </button>
          <button class="btn btn-accent" id="btnNext" onclick="navigate(1)">
            Next →
          </button>
        </div>
      </div>
    </div>

    <!-- Confirm Submit Modal -->
    <div class="modal-overlay" id="submitModal">
      <div class="modal-box">
        <div class="modal-title">Submit Test?</div>
        <div class="modal-body" id="submitModalBody"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeModal()">
            Review Answers
          </button>
          <button class="btn btn-accent" onclick="doSubmit()">
            Submit Now
          </button>
        </div>
      </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
      if (!APP.currentUser || APP.currentUser.role !== "student") {
        window.location.href = "../index.html";
      }

      const quizId = sessionStorage.getItem("ep_quiz");
      const quiz = APP.quizzes.find((q) => q.id === quizId);
      if (!quiz) {
        window.location.href = "student-dashboard.html";
        throw new Error();
      }

      APP.currentQuiz = quiz;
      APP.quizAnswers = {};
      APP.quizStartTime = Date.now();

      let currentQ = 0;

      // ---- Populate header ----
      document.getElementById("quizName").textContent = quiz.title;
      document.getElementById("quizMeta").textContent =
        `${quiz.subject} · ${quiz.questions.length} questions · ${quiz.totalMarks} marks`;

      // ---- Timer ----
      let secondsLeft = quiz.duration * 60;
      const timerEl = document.getElementById("timerDisplay");
      const timerInterval = setInterval(() => {
        secondsLeft--;
        const m = String(Math.floor(secondsLeft / 60)).padStart(2, "0");
        const s = String(secondsLeft % 60).padStart(2, "0");
        timerEl.textContent = `${m}:${s}`;
        if (secondsLeft <= 60) timerEl.classList.add("danger");
        if (secondsLeft <= 0) {
          clearInterval(timerInterval);
          doSubmit();
        }
      }, 1000);

      // ---- Build Q navigation bubbles ----
      function buildQGrid() {
        const grid = document.getElementById("qGrid");
        grid.innerHTML = quiz.questions
          .map(
            (q, i) => `
      <div class="q-bubble ${i === currentQ ? "active" : ""} ${APP.quizAnswers[q.id] !== undefined ? "answered" : ""}"
           onclick="goTo(${i})">${i + 1}</div>
    `,
          )
          .join("");
      }

      // ---- Render current question ----
      function renderQuestion() {
        const q = quiz.questions[currentQ];
        document.getElementById("qNumber").textContent =
          `Question ${currentQ + 1} of ${quiz.questions.length}`;
        document.getElementById("qText").textContent = q.text;

        const letters = ["A", "B", "C", "D"];
        document.getElementById("optionsList").innerHTML = q.options
          .map((opt, i) => {
            const selected = APP.quizAnswers[q.id] === i;
            return `
        <label class="option-item ${selected ? "selected" : ""}" onclick="selectOption('${q.id}', ${i}, this)">
          <input type="radio" name="opt" ${selected ? "checked" : ""} />
          <div class="option-letter">${letters[i]}</div>
          <div class="option-text">${opt}</div>
        </label>
      `;
          })
          .join("");

        // Prev / Next buttons
        document.getElementById("btnPrev").disabled = currentQ === 0;
        document.getElementById("btnNext").textContent =
          currentQ === quiz.questions.length - 1 ? "Finish →" : "Next →";
        if (currentQ === quiz.questions.length - 1) {
          document.getElementById("btnNext").onclick = () => confirmSubmit();
        } else {
          document.getElementById("btnNext").onclick = () => navigate(1);
        }

        buildQGrid();
      }

      function goTo(idx) {
        currentQ = idx;
        renderQuestion();
        document.querySelector(".q-content")?.scrollTo(0, 0);
      }

      function navigate(dir) {
        const next = currentQ + dir;
        if (next >= 0 && next < quiz.questions.length) {
          currentQ = next;
          renderQuestion();
        }
      }

      function selectOption(qId, idx, labelEl) {
        APP.quizAnswers[qId] = idx;
        document
          .querySelectorAll(".option-item")
          .forEach((el) => el.classList.remove("selected"));
        labelEl.classList.add("selected");
        buildQGrid();
      }

      function confirmSubmit() {
        const answered = Object.keys(APP.quizAnswers).length;
        const total = quiz.questions.length;
        document.getElementById("submitModalBody").textContent =
          `You have answered ${answered} out of ${total} questions. Are you sure you want to submit?`;
        document.getElementById("submitModal").classList.add("open");
      }

      function closeModal() {
        document.getElementById("submitModal").classList.remove("open");
      }

      function doSubmit() {
        clearInterval(timerInterval);
        closeModal();
        const result = APP.submitQuiz(quiz.id, APP.quizAnswers);
        sessionStorage.setItem("ep_result", result.id);
        window.location.href = "student-result.html";
      }

      // Initial render
      renderQuestion();
    </script>
  </body>
</html>

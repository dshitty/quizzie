<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamPulse — Result</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <div id="layoutSidebar"></div>
      <main class="main-content">
        <div class="page-header">
          <div class="page-title">Quiz Result</div>
          <div class="page-subtitle">Here's how you did</div>
        </div>
        <div style="max-width: 680px" id="resultWrap">
          <div class="empty-state">
            <div class="empty-icon">⏳</div>
            <div class="empty-text">Loading result…</div>
          </div>
        </div>
      </main>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      if (!UI.requireAuth("student")) throw new Error();
      document.getElementById("layoutSidebar").innerHTML =
        LAYOUT.studentSidebar;
      UI.initSidebar();
      UI.initUserInfo();
      UI.initLogout();
      UI.setActiveNav("nav-results");

      // Load data from localStorage
      APP.init();

      const resultId = sessionStorage.getItem("ep_result");
      const result = APP.results.find((r) => r.id === resultId);
      const wrap = document.getElementById("resultWrap");

      if (!result) {
        wrap.innerHTML =
          '<div class="alert alert-danger">Result not found. <button class="btn" onclick="window.location.href=\'student-dashboard.html\'">← Dashboard</button></div>';
        return;
      }

      const quiz = APP.quizzes.find((q) => q.id === result.quizId);
      const verdict = APP.verdict(result.percent);
      const correct = result.score;
      const wrong = result.total - result.score;

      const scoreColor =
        result.percent >= 80
          ? "var(--success)"
          : result.percent >= 50
            ? "var(--warning)"
            : "var(--danger)";

      const reviewRows = quiz.questions
        .map((q, i) => {
          const chosen = result.answers[i];
          const isCorrect = chosen === q.correct;
          const letters = ["A", "B", "C", "D"];
          const opts = q.options
            .map((opt, oi) => {
              let cls = "";
              if (oi === q.correct) cls = "correct-ans";
              else if (oi === chosen && !isCorrect) cls = "wrong-ans";
              const indicator =
                oi === q.correct
                  ? "correct"
                  : oi === chosen && !isCorrect
                    ? "wrong"
                    : "";
              return `
        <div class="answer-opt-mini ${cls}">
          ${indicator ? `<div class="ans-indicator ${indicator}"></div>` : '<div style="width:6px"></div>'}
          <span>${letters[oi]}. ${opt}</span>
        </div>`;
            })
            .join("");

          return `
      <div class="answer-item">
        <div class="answer-q-num">Q${i + 1} · ${isCorrect ? "✅ Correct" : "❌ Wrong"}</div>
        <div class="answer-q-text">${q.text}</div>
        <div class="answer-options-mini">${opts}</div>
      </div>`;
        })
        .join("");

      wrap.innerHTML = `
    <div class="result-hero">
      <div class="result-label">${quiz?.title || "Quiz Result"}</div>
      <div class="result-score-big" style="color:${scoreColor}">
        ${result.score}<span class="score-total">/${result.total}</span>
      </div>
      <div class="result-percent">${result.percent}% scored</div>
      <div class="result-verdict ${verdict.cls}">${verdict.text}</div>
    </div>

    <div class="result-stats">
      <div class="result-stat">
        <div class="rs-val" style="color:var(--success)">${correct}</div>
        <div class="rs-lbl">Correct</div>
      </div>
      <div class="result-stat">
        <div class="rs-val" style="color:var(--danger)">${wrong}</div>
        <div class="rs-lbl">Wrong</div>
      </div>
      <div class="result-stat">
        <div class="rs-val" style="color:var(--text-muted)">0</div>
        <div class="rs-lbl">Skipped</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:24px;">
      <button class="btn" onclick="window.location.href='student-dashboard.html'">← Back to Dashboard</button>
      <button class="btn" onclick="document.getElementById('reviewSection').scrollIntoView({behavior:'smooth'})">Review Answers ↓</button>
    </div>

    <div class="section-title" id="reviewSection">📋 Answer Review</div>
    <div class="answer-review">${reviewRows}</div>
  `;
    </script>
  </body>
</html>

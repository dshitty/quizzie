<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamPulse — Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: var(--bg-base);
      }
    </style>
  </head>
  <body class="auth-body">
    <!-- Background blobs -->
    <div class="auth-bg-circle c1"></div>
    <div class="auth-bg-circle c2"></div>

    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-text">Exam<span>Pulse</span></div>
        <div class="tagline">Weekly Mock Test Platform</div>
      </div>

      <!-- Role Tabs -->
      <div class="auth-tabs">
        <div
          class="auth-tab active"
          data-role="student"
          onclick="switchTab('student', this)"
        >
          🎓 Student Login
        </div>
        <div
          class="auth-tab"
          data-role="teacher"
          onclick="switchTab('teacher', this)"
        >
          👨‍🏫 Teacher Login
        </div>
      </div>

      <!-- Error -->
      <div class="auth-error" id="authError"></div>

      <!-- Form -->
      <div class="form-group">
        <label class="form-label">Username</label>
        <input
          type="text"
          class="form-input"
          id="inputUsername"
          placeholder="Enter your username"
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-input"
          id="inputPassword"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign In →</button>

      <!-- Demo Accounts -->
      <div class="demo-accounts">
        <div class="demo-label">Demo Accounts</div>
        <div class="demo-row">
          <span class="demo-icon">🎛️</span>
          <span class="demo-name">Controller</span>
          <span class="demo-creds">admin / admin123</span>
          <button
            class="demo-fill"
            onclick="fill('admin', 'admin123', 'teacher')"
          >
            Fill
          </button>
        </div>
        <div class="demo-row">
          <span class="demo-icon">🎓</span>
          <span class="demo-name">Student 1</span>
          <span class="demo-creds">riya / pass123</span>
          <button
            class="demo-fill"
            onclick="fill('riya', 'pass123', 'student')"
          >
            Fill
          </button>
        </div>
        <div class="demo-row">
          <span class="demo-icon">🎓</span>
          <span class="demo-name">Student 2</span>
          <span class="demo-creds">arjun / pass123</span>
          <button
            class="demo-fill"
            onclick="fill('arjun', 'pass123', 'student')"
          >
            Fill
          </button>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script>
      let activeRole = "student";

      // Redirect if already logged in
      if (APP.currentUser) {
        redirectUser(APP.currentUser);
      }

      function switchTab(role, el) {
        activeRole = role;
        document
          .querySelectorAll(".auth-tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("authError").style.display = "none";
      }

      function fill(user, pass, role) {
        document.getElementById("inputUsername").value = user;
        document.getElementById("inputPassword").value = pass;
        // Switch to correct tab
        const tab = document.querySelector(`.auth-tab[data-role="${role}"]`);
        if (tab) switchTab(role, tab);
      }

      async function doLogin() {
        const username = document.getElementById("inputUsername").value.trim();
        const password = document.getElementById("inputPassword").value;
        const errEl = document.getElementById("authError");
        errEl.style.display = "none";

        if (!username || !password) {
          showError("Please enter username and password.");
          return;
        }

        const res = await APP.login(username, password);
        if (!res.ok) {
          showError(res.error);
          return;
        }

        // Role mismatch check
        if (res.user.role !== activeRole) {
          showError(
            `This account is for ${res.user.role}s. Please select the correct login tab.`,
          );
          APP.currentUser = null;
          sessionStorage.removeItem("ep_user");
          return;
        }

        redirectUser(res.user);
      }

      function redirectUser(user) {
        if (user.role === "teacher")
          window.location.href = "pages/teacher-dashboard.html";
        else window.location.href = "pages/student-dashboard.html";
      }

      function showError(msg) {
        const el = document.getElementById("authError");
        el.textContent = msg;
        el.style.display = "block";
      }

      // Enter key submits
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
